<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Détail Produit - LOUNARA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <img src="images/logo.png" alt="LOUNARA" class="logo">
</header>

<main class="product-detail">
  <h2 class="product-name" style="text-align:center;"></h2>
  <div class="product-carousel" style="display:flex; justify-content:center; gap:10px;"></div>
  <p class="product-description" style="text-align:center; max-width:700px; margin:20px auto;"></p>
</main>

<footer>
  <div class="footer-content">© 2026 LOUNARA — Tous droits réservés</div>
</footer>

<script>
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');

fetch('json/products.json')
.then(res => {
  if(!res.ok) throw new Error('Impossible de charger le JSON');
  return res.json();
})
.then(products => {
  const p = products.find(prod => prod.id === productId);
  if(!p){ document.body.innerHTML="<h2>Produit non trouvé</h2>"; return; }

  document.querySelector('.product-name').textContent = p.name;
  document.querySelector('.product-description').textContent = p.description;
  const carousel=document.querySelector('.product-carousel');

  p.images.forEach((imgSrc,i)=>{
    const img=document.createElement('img');
    img.dataset.src=imgSrc;
    if(i===0) img.classList.add('active');
    img.alt=p.name+' - vue '+(i+1);
    carousel.appendChild(img);
  });

  const firstImg=new Image();
  firstImg.src=p.images[0];

  carousel.querySelectorAll('img').forEach(img=>img.src=img.dataset.src);

  const imgs=carousel.querySelectorAll('img');
  let current=0;
  function showNext(){
    imgs.forEach(img=>img.classList.remove('active'));
    imgs[current].classList.add('active');
    current=(current+1)%imgs.length;
  }
  setInterval(showNext,3000);

})
.catch(err=>{
  document.querySelector('.product-detail').innerHTML=`<p style="text-align:center;color:red;">Erreur: ${err.message}</p>`;
  console.error(err);
});
</script>
</body>
</html>
